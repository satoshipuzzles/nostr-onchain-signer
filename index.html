<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nostr Onchain" />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-48.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/icons/icon-128.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Nostr Onchain</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: #0a0a0f; }
      #root { width: 100vw; height: 100vh; height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888;font-family:system-ui,sans-serif;background:#0a0a0f">
        Loading Nostr Onchain...
      </div>
    </div>
    <script>
      // Unregister any stale service workers to prevent cache issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var r of registrations) { r.unregister(); }
        });
      }
    </script>
    <script type="module" src="/src/popup/main.tsx"></script>
  </body>
</html>
